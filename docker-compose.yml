services:
  # ---- FastAPI Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mpc-whatsapp-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mpc-network

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: mpc-postgres
    environment:
      POSTGRES_USER: mpc_user
      POSTGRES_PASSWORD: mpc_password
      POSTGRES_DB: mpc_whatsapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpc_user -d mpc_whatsapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mpc-network

  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: mpc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mpc-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mpc-network:
    driver: bridge
